      layer: Layer Key
      position:
        x: Horizontal Position
        y: Vertical Position
  # ------------------------------------------- CRATES
  crates:
    - key: Crate Asset Key
      layer: Layer Key
      position: 
        x: Horizontal Position
        y: Vertical Position
  # ------------------------------------------- DOORS
  doors:

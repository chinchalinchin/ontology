intents:
  # -------------------------- ACTIONS
  actions:
    - cast
    - thrust
    - walk
    - slash
    - shoot
    - die
  # -------------------------- COMMUNICATIONS
  communications: 
    plot-a: null
    plot-b: null
  # -------------------------- DIRECTIONS
  directions:
    up: null
    left: null
    down: null
    right: null
  # --------------------------
  # --------------------------
  # -------------------------- DISPOSITIONS
  dispositions:
    # ------------------------
    # ------------------------ ATTACK
    attack:
      # ---------------------- ATTACK: REACHABLE ACTIONS
      actions:
        - cast
        - slash
        - shoot
        - thrust
      # ---------------------- ATTACK: REACHABLE EXTENSIONS
      extensions: null
      # ---------------------- ATTACK: TRANSITIONS
      transitions:
        - next: attack
          conditions:  
            - sprite.goal.target.category == 'sprite'
        - next: hunt
          conditions: 
            - not sprite.goal.target
            - sprite.memory.goal.target == 'sprite'
        - next: loot
          condition: 
            - sprites[sprite.target.name].mutators.triggers.dead
    # ------------------------
    # ------------------------ ATTRACT
    attract:
      # ---------------------- ATTRACT: REACHABLE ACTIONS
      actions: null
      # ---------------------- ATTRACT: REACHABLE EXTENSIONS
      extensions: 
        - interact
      # ---------------------- ATTRACT: TRANSITIONS
      transitions:
        - next: attract
          condition: sprite.inventory.loot
        - next: communicate
          condition: sprite.memory.communications
        - next: barter
          condition: sprite.inventory.loot
    # ------------------------
    # ------------------------ BARTER:
    barter:
      actions: null
      extensions:
        - trade
      transitions: 
        - next: barter
          condition:
    communicate:
      actions: null
      extensions: null
      transitions:
        - next: 
          condition: 
    escape: 
      transitions:
        - next: escape
          condition: 
            - sprite.disposition == 'escape' 
            - sprite.target.disposition == 'attack'
        - next: return
          condition: sprite.
    find: 
      transitions:
        - next: loot
          condition: 
        - next: recoil
          condition:
        - next: return
          condition: 
    follow: 
      transitions: 
        - next: follow
          condition: sprite.intention.disposition == 'follow' and sprite.goal.target
        - next: hunt
          condition: 
        - next: wander
          condition: 
    idle: 
      transitions: 
        - next: idle
          condition: sprite.intention.disposition == 'idle'
        - next: recoil
          condition: sprite.mutators.triggers.struck
        - next: wander
          condition:
    interact:
      transitions:
        - next:
          condition:
    loot:
      transitions:
        - next: return
          condition: 
    mock: 
      transitions:
        - next: mock
          condition: 
        - next: threaten
          condition: 
    recoil:
      transitions:
        - next: attack
          condition: 
        - next: escape
          condition: sprite.mutators.frightened
    return:
      transitions:
        - next: idle
          condition: 
        - next: return
          condition:
        - next: wander
          condition: 
    threaten:
      transitions:
        - next: attack
          condition: 
        - next: hunt
          condition:  
        - next: threaten
          condition: 
        - next: recoil
          condition:
    wander:
      transitions:
        - next: recoil
          condition: 
  

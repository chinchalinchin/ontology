intents:
  # -------------------------- ACTIONS
  actions:
    - cast
    - thrust
    - walk
    - slash
    - shoot
    - die
  # -------------------------- DIRECTIONS
  directions:
    - up
    - left
    - down
    - right
  # -------------------------- COMMUNICATIONS
  communications: 
    plots:
      - a
      - b
  # --------------------------
  # --------------------------
  # -------------------------- DISPOSITIONS
  dispositions:
    # ------------------------
    # ------------------------ ATTACK
    attack:
      # ---------------------- REACHABLE ACTIONS
      actions:
        - cast
        - slash
        - shoot
        - thrust
      # ---------------------- REACHABLE EXTENSIONS
      extensions: null
      # ---------------------- TRANSITIONS
      transitions:
        - next: attack
          conditions:  
            - sprite.goal.target.category == 'sprite'
        - next: hunt
          conditions: 
            - not sprite.intention.goal.target
            - sprite.memory.goal.target == 'sprite'
        - next: loot
          condition: 
            - sprites[sprite.target.name].mutators.triggers.dead
    # ------------------------
    # ------------------------ ATTRACT
    attract:
      # ---------------------- REACHABLE ACTIONS
      actions: null
      # ---------------------- REACHABLE EXTENSIONS
      extensions: 
        - interact
      # ---------------------- TRANSITIONS
      transitions:
        - next: barter
          condition: 
        - next: communicate
          condition: sprite.memory.communications
    barter:
      transitions: 
        - next:
          condition:
    communicate:
      actions: null
      extensions: null
      transitions:
        - next: 
          condition: 
    escape: 
      transitions:
        - next: escape
          condition: 
            - sprite.disposition == 'escape' 
            - sprite.target.disposition == 'attack'
        - next: return
          condition: sprite.
    find: 
      transitions:
        - next: loot
          condition: 
        - next: recoil
          condition:
        - next: return
          condition: 
    follow: 
      transitions: 
        - next: follow
          condition: sprite.intention.disposition == 'follow' and sprite.goal.target
        - next: hunt
          condition: 
        - next: wander
          condition: 
    idle: 
      transitions: 
        - next: idle
          condition: sprite.intention.disposition == 'idle'
        - next: recoil
          condition: sprite.mutators.triggers.struck
        - next: wander
          condition:
    interact:
      transitions:
        - next:
          condition:
    loot:
      transitions:
        - next: return
          condition: 
    mock: 
      transitions:
        - next: mock
          condition: 
        - next: threaten
          condition: 
    recoil:
      transitions:
        - next: attack
          condition: 
        - next: escape
          condition: sprite.mutators.frightened
    return:
      transitions:
        - next: idle
          condition: 
        - next: return
          condition:
        - next: wander
          condition: 
    threaten:
      transitions:
        - next: attack
          condition: 
        - next: hunt
          condition:  
        - next: threaten
          condition: 
        - next: recoil
          condition:
    wander:
      transitions:
        - next: recoil
          condition: 
  # -------------------------- EXTENSIONS
  extensions:
    interact: null
    speak: null
    sprint: null
  # -------------------------- MOTIVATIONS
  motivations:
    conquest: null
    profit: null
    survival: null
    love: null
    revenge: null
    rebellion: null
    
    

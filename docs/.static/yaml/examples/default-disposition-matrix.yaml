        - next: attack
          condition: 
        - next: escape
          condition: sprite.mutators.frightened
    return:
      transitions:
        - next: idle
          condition: 
        - next: return
          condition:
        - next: wander
          condition: 
    threaten:
      transitions:
        - next: attack
          condition: 
        - next: hunt
          condition:  
        - next: threaten
          condition: 
        - next: recoil
          condition:
    wander:
      transitions:
        - next: recoil

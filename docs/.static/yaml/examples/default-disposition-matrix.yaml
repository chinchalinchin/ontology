intents:
  dispositions:
    attack:
      actions:
        - cast
        - slash
        - shoot
        - thrust
      extensions: null
      transitions:
        - next: attack
          conditions:  
            - sprite.intention.goal.target.category == 'sprite'
        - next: hunt
          conditions: 
            - not sprite.intention.goal.target
            - sprite.memory.goal.target.category == 'sprite'
        - next: loot
          condition: 
            - sprites[sprite.target.name].mutators.triggers.dead
    attract:
      actions: null
      extensions:
        - interact
      transitions:
        - next: barter
          condition:
        - next: communicate
          condition: sprite.memory.communications
    barter:
      transitions: 
        - next:
          condition:
    escape: 
      actions: null
      extensions: null
      transitions:
        - next: escape
          condition: 
            - sprite.disposition == 'escape' 
            - sprite.target.disposition == 'attack'
        - next: return
          condition: sprite
      communicate:
        actions: null
        extensions: null
        transitions:
          - next: 
            condition: 
    find: 
      transitions:
        - next: loot
          condition: 
        - next: recoil
          condition:
        - next: return
          condition: 
    follow: 
      transitions: 
        - next: follow
          condition: 
        - next: hunt
          condition: 
        - next: wander
          condition: 
    idle: 
      transitions: 
        - next: idle
          condition: 
        - next: recoil
          condition: sprite.mutators.struck.triggered
        - next: wander
          condition:
    interact:
      transitions:
        - next:
          condition:
    loot:
      transitions:
        - next: return
          condition: 
    mock: 

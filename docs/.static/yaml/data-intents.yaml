intents:
  # -------------------------- ACTIONS
  actions:
    <key>:
      row: <row-index>
      frames: <frames-per-row>
  # -------------------------- COMMUNICATIONS
  communications: 
    - <plot-state-key>
  # -------------------------- DIRECTIONS
  directions:
    <key>:
      offset: <row-offset>
  # -------------------------- DISPOSITIONS
  dispositions:
    <key>:
      actions:
        - <reachable-action-key>
      extensions:
        - <reachable-extension-key>
      transitions:
        - next: <next-disposition-key>
          conditions: <condition-for-transition>
  # -------------------------- EXTENSIONS
  extensions:
    <key>:
  # -------------------------- MOTIVATIONS
  motivations:
    <key>
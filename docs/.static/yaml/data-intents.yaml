intents:
  # -------------------------- ACTIONS
  actions:
    cast:
      row: <row-index>
      frames: <frames-per-row>
    thrust:
      row: <row-index>
      frames: <frames-per-row>
    walk:
      row: <row-index>
      frames: <frames-per-row>
    slash:
      row: <row-index>
      frames: <frames-per-row>
    shoot:
      row: <row-index>
      frames: <frames-per-row>
    die:
      row: <row-index>
      frames: <frames-per-row>
  # -------------------------- COMMUNICATIONS
  communications: 
    - <plot-state-key>
  # -------------------------- DIRECTIONS
  directions:
    up:
      offset: <row-offset>
    left:
      offset: <row-offset>
    down:
      offset: <row-offset>
    right:
      offset: <row-offset>
  # -------------------------- DISPOSITIONS
  dispositions:
    <key>:
      transitions:
        - next: <next-disposition-key>
          conditions: <condition-for-transition>
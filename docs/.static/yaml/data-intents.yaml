intents:
  # -------------------------- ACTIONS
  actions:
    <action-key>:
  # -------------------------- COMMUNICATIONS
  communications: 
    <plot-state-key>:
  # -------------------------- DIRECTIONS
  directions:
    <direction-key>:
  # -------------------------- DISPOSITIONS
  dispositions:
    <disposition-key>:
      actions:
        - <reachable-action-key>
      extensions:
        - <reachable-extension-key>
      transitions:
        - next: <next-disposition-key>
          conditions: <condition-for-transition>
  # -------------------------- EXPRESSIONS
  expressions:
    <expression-key>:
      dispositions: 
        - <disposition-trigger-key>
  # -------------------------- EXTENSIONS
  extensions:
    <extension-key>:
  # -------------------------- MOTIVATIONS
  motivations:
    <motivation-key>:
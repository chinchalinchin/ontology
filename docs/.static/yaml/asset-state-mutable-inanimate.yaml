objects:
  # ------------------------------------------- CHESTS
  chests:
    - name: Chest Identifier
      key: Chest Asset Key
      layer: Layer Key
      position:
        x: Horizontal Position
        y: Vertical Position
  # ------------------------------------------- CRATES
  crates:
    - name: Crate Identifier
      key: Crate Asset Key
      layer: Layer Key
      position: 
        x: Horizontal Position
        y: Vertical Position
  # ------------------------------------------- DOORS
  cursors: 
    - name: Cursor Identifier
      key: Cursor Asset Key
      layer: Layer Key
      position: 
        x: Horizontal Position
        y: Vertical Position
  # ------------------------------------------- DOORS
  doors:
    - name: Door Identifier
      key: Door Asset Key
      layer: Layer Key
      outlayer: Out Layer Key
      position:
        x: Horizontal Position
        y: Vertical Position
  # ------------------------------------------- GATES
  gates:
    - name: Gate Identifier
      key: Gate Asset Key
      layer: Layer Key
      link: Plate Link Key
      position:
        x: Horizontal Position
        y: Vertical Position
  # ------------------------------------------- PLATES
  plates:
    - name: Plate Identifier
      key: Plate Asset Key
      layer: Layer Key
      link: Gate Link Key
      position:
        x: Horizontal Position
        y: Vertical Position
